<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#d9d5c6" opacity="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fafaf7" stop-opacity="1"/>
      <stop offset="55%" stop-color="#fafaf7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fafaf7" stop-opacity="0"/>
    </linearGradient>
    <mask id="fademask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#fafaf7"/>

  <!-- Dot grid right-half, faded -->
  <g transform="translate(600,0)">
    <rect width="600" height="630" fill="url(#dots)" mask="url(#fademask)"/>
  </g>

  <!-- Top rule -->
  <rect x="80" y="80" width="80" height="3" fill="#0a0a0a"/>

  <!-- Kicker -->
  <text x="80" y="115" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#5a5a5a" letter-spacing="2">
    UK SALARY DATA · 2024/25 TAX YEAR
  </text>

  <!-- Headline (serif) -->
  <text x="80" y="230" font-family="Fraunces, 'Times New Roman', serif" font-size="82" font-weight="700" fill="#0a0a0a" letter-spacing="-3">
    What does that
  </text>
  <text x="80" y="320" font-family="Fraunces, 'Times New Roman', serif" font-size="82" font-weight="500" font-style="italic" fill="#b45309" letter-spacing="-3">
    actually pay?
  </text>

  <!-- Subline -->
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#2c2c2c">
    Median pay, quartiles and take-home for 600 job × city combinations.
  </text>
  <text x="80" y="412" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#2c2c2c">
    Source: ONS Annual Survey of Hours and Earnings.
  </text>

  <!-- Stat row -->
  <g transform="translate(80, 500)">
    <g>
      <text font-family="Fraunces, serif" font-size="38" font-weight="700" fill="#0a0a0a">30</text>
      <text y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5a5a5a" letter-spacing="1">JOBS</text>
    </g>
    <g transform="translate(130,0)">
      <text font-family="Fraunces, serif" font-size="38" font-weight="700" fill="#0a0a0a">20</text>
      <text y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5a5a5a" letter-spacing="1">UK CITIES</text>
    </g>
    <g transform="translate(290,0)">
      <text font-family="Fraunces, serif" font-size="38" font-weight="700" fill="#0a0a0a">600+</text>
      <text y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5a5a5a" letter-spacing="1">SALARY PAGES</text>
    </g>
    <g transform="translate(470,0)">
      <text font-family="Fraunces, serif" font-size="38" font-weight="700" fill="#0a0a0a">2024/25</text>
      <text y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5a5a5a" letter-spacing="1">TAX YEAR</text>
    </g>
  </g>

  <!-- Brand mark bottom right -->
  <g transform="translate(1000, 540)">
    <rect x="0" y="0" width="40" height="40" rx="6" fill="#0a0a0a"/>
    <text x="20" y="28" font-family="Fraunces, serif" font-size="20" font-weight="700" fill="#fafaf7" text-anchor="middle">SD</text>
    <text x="55" y="22" font-family="Fraunces, serif" font-size="22" font-weight="700" fill="#0a0a0a">SalaryData</text>
    <text x="55" y="42" font-family="Inter, sans-serif" font-size="14" fill="#5a5a5a">.co.uk</text>
  </g>
</svg>